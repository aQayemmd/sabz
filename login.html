<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- FontAwesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Swiper CSS (اضافه شده) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
  
  <!-- استایل‌های اختصاصی شما -->
  <link rel="stylesheet" href="./login.css">
</head>
<body>

    <div class="login-page">
    <div class="login-card">

        <div class="login-header">
            <a href="#" class="login-logo">
                <img src="./image/67ca0149-a02c-4d04-9165-b8badad71236.png" alt="آبان بیوتیک">
            </a>
         <a href="#" class="back-arrow" title="بازگشت">
             <i class="fa-solid fa-arrow-right"></i>
        </a>
        </div>

        <h1 class="login-title">ورود یا ثبت‌نام در آبان بیوتیک</h1>
        <p class="login-subtitle">لطفاً شماره موبایل یا ایمیل خود را وارد کنید</p>

    <form class="login-form" id="loginForm">
    <input type="text" class="login-input" id="phoneInput" placeholder="شماره موبایل یا پست الکترونیک" required>
    <button type="submit" class="login-submit-btn">ورود به آبان بیوتیک</button>
</form>

<div class="account-alert" id="accountAlert" style="display: none;">
    <i class="fa-solid fa-circle-info"></i>
    <span>حساب کاربری با این شماره پیدا نشد. <a href="./register.html">ساخت حساب جدید</a></span>
</div>

    </div>
</div>
<script src="./login.js"></script>
</body>
</html>
